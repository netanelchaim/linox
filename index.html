<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סייבר//לינוקס — טרמינל לימוד</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Heebo:wght@300;400;500;600;700&display=swap');

:root {
  --void: #050508;
  --base: #090912;
  --surface: #0d0d1a;
  --elevated: #121220;
  --card: #161628;
  --hover: #1c1c30;
  --border: #1a2234;
  --border-bright: #00ff8835;
  --ng: #00ff88;
  --nc: #00d4ff;
  --np: #a855f7;
  --nr: #ff3366;
  --ny: #fbbf24;
  --ng-dim: #00ff8818;
  --nc-dim: #00d4ff18;
  --np-dim: #a855f718;
  --nr-dim: #ff336618;
  --ny-dim: #fbbf2418;
  --ng-glow: 0 0 20px #00ff8855, 0 0 40px #00ff8820;
  --nc-glow: 0 0 20px #00d4ff55, 0 0 40px #00d4ff20;
  --t1: #dff5e8;
  --t2: #8aa89a;
  --t3: #3d5048;
  --mono: 'Share Tech Mono', 'Courier New', monospace;
  --ui: 'Heebo', sans-serif;
  --display: 'Orbitron', sans-serif;
  --sb: 280px;
  --hh: 56px;
  --r: 5px;
  --ease: 0.18s cubic-bezier(0.4,0,0.2,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body {
  font-family: var(--ui);
  background: var(--void);
  color: var(--t1);
  min-height: 100vh;
  overflow-x: hidden;
  direction: rtl;
}

body::before {
  content:'';
  position:fixed;inset:0;
  background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,136,0.008) 3px,rgba(0,255,136,0.008) 4px);
  pointer-events:none;z-index:9999;
}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--base)}
::-webkit-scrollbar-thumb{background:#00ff8830;border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#00ff8860}

/* ===== פריסה ===== */
#app{display:grid;grid-template-columns:1fr var(--sb);grid-template-rows:var(--hh) 1fr;grid-template-areas:"hdr hdr" "main sb";height:100vh;overflow:hidden}

/* ===== כותרת עליונה ===== */
#hdr {
  grid-area:hdr;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:relative;z-index:50;gap:16px;
  flex-direction:row-reverse;
}

#hdr::after {
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--ng) 40%,var(--nc) 60%,transparent 100%);
  opacity:0.35;
}

.logo {display:flex;align-items:center;gap:11px;flex-shrink:0;cursor:pointer;flex-direction:row-reverse}

.logo-box {
  width:34px;height:34px;
  border:1.5px solid var(--ng);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:13px;color:var(--ng);
  box-shadow:var(--ng-glow);
  animation:logoflicker 6s ease-in-out infinite;
}

@keyframes logoflicker{0%,90%,100%{opacity:1}92%{opacity:0.4}94%{opacity:1}96%{opacity:0.7}}

.logo-text {font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:2px;color:var(--ng);text-shadow:0 0 12px var(--ng);line-height:1.15;text-align:right}
.logo-sub {font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--t3);text-align:right}

/* סרגל התקדמות */
.hdr-progress {flex:1;display:flex;align-items:center;gap:12px;max-width:400px;flex-direction:row-reverse}
.hdr-progress-label {font-family:var(--ui);font-size:11px;color:var(--t3);white-space:nowrap;font-weight:600}
.progress-track {flex:1;height:3px;background:var(--elevated);border-radius:2px;overflow:hidden}
.progress-fill {height:100%;background:linear-gradient(270deg,var(--ng),var(--nc));border-radius:2px;transition:width 0.8s ease;box-shadow:0 0 8px var(--ng);width:0%}
.progress-pct {font-family:var(--mono);font-size:11px;color:var(--ng);min-width:34px;text-align:left}

.hdr-right {display:flex;align-items:center;gap:12px;flex-shrink:0}
.online-badge {font-family:var(--mono);font-size:10px;padding:3px 10px;border:1px solid var(--ng);border-radius:2px;color:var(--ng);box-shadow:0 0 8px #00ff8825;letter-spacing:1px}
.online-badge::before{content:'● ';animation:blink 2s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.completed-counter {font-family:var(--ui);font-size:11px;color:var(--t3);font-weight:600}
.completed-counter span {color:var(--ng)}

/* ===== סרגל צד ===== */
#sb {
  grid-area:sb;
  background:var(--surface);
  border-right:1px solid var(--border);
  overflow-y:auto;
  padding-bottom:32px;
  direction:rtl;
}

.sb-header {
  padding:18px 18px 12px;
  border-bottom:1px solid var(--border);
}

.sb-title {font-family:var(--ui);font-size:10px;letter-spacing:1px;color:var(--t3);text-transform:uppercase;font-weight:700}

.level-group {margin-top:4px}

.level-btn {
  display:flex;align-items:center;gap:9px;
  padding:9px 18px;
  cursor:pointer;transition:background var(--ease);
  user-select:none;position:relative;width:100%;border:none;background:transparent;text-align:right;
  flex-direction:row-reverse;
}

.level-btn:hover{background:var(--hover)}

.lvl-badge {
  font-family:var(--display);font-size:9px;font-weight:700;
  width:20px;height:20px;border-radius:3px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

.l1 .lvl-badge{background:var(--ng-dim);border:1px solid #00ff8850;color:var(--ng)}
.l2 .lvl-badge{background:var(--nc-dim);border:1px solid #00d4ff50;color:var(--nc)}
.l3 .lvl-badge{background:var(--np-dim);border:1px solid #a855f750;color:var(--np)}
.l4 .lvl-badge{background:var(--nr-dim);border:1px solid #ff336650;color:var(--nr)}
.l5 .lvl-badge{background:var(--ny-dim);border:1px solid #fbbf2450;color:var(--ny)}

.lvl-info{flex:1;min-width:0;text-align:right}
.lvl-name{font-family:var(--ui);font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.l1 .lvl-name{color:var(--ng)} .l2 .lvl-name{color:var(--nc)} .l3 .lvl-name{color:var(--np)} .l4 .lvl-name{color:var(--nr)} .l5 .lvl-name{color:var(--ny)}
.lvl-sub{font-family:var(--ui);font-size:10px;color:var(--t3);margin-top:1px}

.lvl-arrow{font-family:var(--mono);font-size:11px;color:var(--t3);transition:transform var(--ease);flex-shrink:0}
.level-group.open .lvl-arrow{transform:rotate(-90deg)}

.lvl-pbar{height:1px;margin:0 18px 1px;background:var(--border);overflow:hidden}
.l1 .lvl-pbar-fill{background:var(--ng)} .l2 .lvl-pbar-fill{background:var(--nc)} .l3 .lvl-pbar-fill{background:var(--np)} .l4 .lvl-pbar-fill{background:var(--nr)} .l5 .lvl-pbar-fill{background:var(--ny)}
.lvl-pbar-fill{height:100%;transition:width 0.7s ease;box-shadow:0 0 6px currentColor}

.lesson-list{display:none;padding:2px 0}
.level-group.open .lesson-list{display:block}

.lesson-btn {
  display:flex;align-items:center;gap:8px;
  padding:7px 18px 7px 18px;
  padding-right:32px;
  cursor:pointer;transition:all var(--ease);
  font-family:var(--ui);font-size:12px;color:var(--t2);
  background:transparent;border:none;text-align:right;width:100%;
  position:relative;
  flex-direction:row-reverse;
}

.lesson-btn:hover{color:var(--t1);background:var(--hover)}
.lesson-btn.active{color:var(--ng);background:var(--ng-dim)}
.lesson-btn.active::after{content:'';position:absolute;right:0;top:0;bottom:0;width:2px;background:var(--ng);box-shadow:var(--ng-glow)}

.lesson-dot{width:14px;height:14px;border-radius:2px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;flex-shrink:0;transition:all var(--ease)}
.lesson-btn.done .lesson-dot{background:var(--ng-dim);border-color:var(--ng);color:var(--ng)}
.lesson-btn.active .lesson-dot{border-color:var(--ng);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.lesson-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}

/* ===== תוכן ראשי ===== */
#main {
  grid-area:main;
  overflow-y:auto;
  background:var(--void);
}

#content {
  max-width:820px;
  margin:0 auto;
  padding:36px 36px 80px;
}

/* דף שיעור */
.lesson-page {animation:fadein 0.3s ease}
@keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.lesson-crumb {
  font-family:var(--ui);font-size:11px;color:var(--t3);
  display:flex;align-items:center;gap:6px;margin-bottom:20px;
  flex-direction:row-reverse;justify-content:flex-end;
}
.crumb-sep{color:var(--ng);opacity:0.4}
.crumb-cur{color:var(--nc)}

.lesson-hdr{margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border);position:relative;text-align:right}
.lesson-hdr::after{content:'';position:absolute;bottom:0;right:0;width:50px;height:1px;background:var(--ng);box-shadow:0 0 8px var(--ng)}

.lesson-lvl-tag {
  font-family:var(--ui);font-size:10px;letter-spacing:1px;text-transform:uppercase;
  display:inline-flex;align-items:center;gap:6px;margin-bottom:10px;flex-direction:row-reverse;
}
.tag-dot{width:5px;height:5px;border-radius:50%;background:var(--ng);box-shadow:0 0 6px var(--ng)}

.lesson-title {
  font-family:var(--ui);font-size:clamp(18px,2.5vw,28px);
  font-weight:700;color:var(--t1);
  line-height:1.3;margin-bottom:10px;
}

.lesson-desc {font-size:14px;color:var(--t2);line-height:1.9;max-width:620px;margin-right:0;margin-left:auto}

.lesson-meta {display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;flex-direction:row-reverse}
.meta-pill {font-family:var(--ui);font-size:10px;color:var(--t3);padding:3px 9px;border:1px solid var(--border);border-radius:2px}

/* כרטיסי תוכן */
.s-card {
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:18px;overflow:hidden;
  transition:border-color var(--ease);
}
.s-card:hover{border-color:#00ff8818}

.s-hdr {
  display:flex;align-items:center;gap:11px;
  padding:12px 18px;background:var(--elevated);
  border-bottom:1px solid var(--border);
  flex-direction:row-reverse;
}

.s-icon{width:28px;height:28px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.theory .s-icon{background:var(--nc-dim);border:1px solid #00d4ff25}
.handson .s-icon{background:var(--ng-dim);border:1px solid #00ff8825}
.install .s-icon{background:var(--np-dim);border:1px solid #a855f725}
.tip-box .s-icon{background:var(--ny-dim);border:1px solid #fbbf2425}

.s-title{font-family:var(--ui);font-size:13px;font-weight:700;letter-spacing:0.5px;flex:1;text-align:right}
.theory .s-title{color:var(--nc)} .handson .s-title{color:var(--ng)} .install .s-title{color:var(--np)} .tip-box .s-title{color:var(--ny)}

.s-body{padding:18px;text-align:right}
.s-body p{font-size:14px;color:var(--t2);line-height:1.9;margin-bottom:12px}
.s-body p:last-of-type{margin-bottom:0}
.s-body strong{color:var(--t1)}
.s-body h4{font-family:var(--ui);font-size:11px;color:var(--nc);letter-spacing:1px;margin:16px 0 8px;font-weight:700}
.s-body ul{list-style:none;padding:0;margin-bottom:10px}
.s-body ul li{font-size:14px;color:var(--t2);padding:3px 18px 3px 0;position:relative;line-height:1.8}
.s-body ul li::before{content:'◂';position:absolute;right:0;color:var(--ng);font-size:9px;top:7px}

/* בלוקי קוד */
.cmd-block {
  background:var(--void);border:1px solid var(--border);
  border-radius:var(--r);margin:10px 0;overflow:hidden;
  direction:ltr;
}

.cmd-hdr {
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 13px;background:var(--elevated);border-bottom:1px solid var(--border);
  direction:ltr;
}

.cmd-label {
  font-family:var(--mono);font-size:9px;letter-spacing:2px;
  color:var(--t3);text-transform:uppercase;display:flex;align-items:center;gap:7px;
}
.cmd-label::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--ng);box-shadow:0 0 5px var(--ng)}

.copy-btn {
  font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;
  color:var(--t3);background:transparent;border:1px solid var(--border);
  padding:2px 9px;border-radius:2px;cursor:pointer;transition:all var(--ease);
}
.copy-btn:hover{color:var(--ng);border-color:var(--ng);box-shadow:0 0 8px #00ff8825}
.copy-btn.copied{color:var(--ng);border-color:var(--ng);background:var(--ng-dim)}

.cmd-body{padding:13px 15px;overflow-x:auto;direction:ltr}
.cmd-body code{font-family:var(--mono);font-size:12.5px;color:var(--ng);display:block;white-space:pre;line-height:1.9;text-align:left}
.cmd-body code .cm{color:var(--t3);font-style:italic}
.cmd-body code .fl{color:var(--nc)}
.cmd-body code .ar{color:var(--ny)}
.cmd-body code .out{color:var(--t2)}
.cmd-body code .kw{color:var(--np)}

/* תיבות מידע */
.info-box {
  padding:12px 14px;border-radius:var(--r);margin:12px 0;
  font-size:13px;line-height:1.8;display:flex;gap:10px;
  flex-direction:row-reverse;text-align:right;
}
.info-box .ib-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.info-box.tip{background:var(--nc-dim);border:1px solid #00d4ff20;color:#7dd3e8}
.info-box.warn{background:var(--ny-dim);border:1px solid #fbbf2420;color:#c4a535}
.info-box.danger{background:var(--nr-dim);border:1px solid #ff336620;color:#d47a7a}
.info-box.success{background:var(--ng-dim);border:1px solid #00ff8820;color:#6dcf95}

/* מחסום ידע / חידון */
.checkpoint-wrap {
  background:var(--surface);border:1px solid #fbbf2420;
  border-radius:var(--r);overflow:hidden;margin-bottom:18px;
}
.checkpoint-wrap .s-hdr{background:var(--elevated)}
.checkpoint-wrap .s-title{color:var(--ny)}

.quiz-q{font-size:14px;color:var(--t1);font-weight:600;margin-bottom:14px;line-height:1.7;text-align:right}

.quiz-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}

.qopt {
  display:flex;align-items:center;gap:11px;
  padding:10px 14px;background:var(--elevated);border:1px solid var(--border);
  border-radius:var(--r);cursor:pointer;transition:all var(--ease);
  font-size:13px;color:var(--t2);user-select:none;
  flex-direction:row-reverse;text-align:right;
}
.qopt:hover{border-color:var(--ny);color:var(--t1);background:var(--hover)}
.qopt.sel{border-color:var(--ny);background:var(--ny-dim);color:var(--t1)}
.qopt.right{border-color:var(--ng);background:var(--ng-dim);color:var(--ng)}
.qopt.wrong{border-color:var(--nr);background:var(--nr-dim);color:var(--nr)}

.qletter {
  width:21px;height:21px;border-radius:2px;background:var(--void);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;font-weight:700;flex-shrink:0;
}

.quiz-submit{
  font-family:var(--ui);font-size:12px;font-weight:700;letter-spacing:1px;
  padding:9px 20px;background:transparent;
  border:1px solid var(--ny);color:var(--ny);border-radius:2px;cursor:pointer;transition:all var(--ease);
}
.quiz-submit:hover{background:var(--ny-dim);box-shadow:0 0 15px #fbbf2425}
.quiz-submit:disabled{opacity:0.25;cursor:not-allowed}

.quiz-fb {
  margin-top:11px;padding:10px 13px;border-radius:var(--r);
  font-size:13px;display:none;line-height:1.6;text-align:right;
}
.quiz-fb.right{background:var(--ng-dim);border:1px solid #00ff8830;color:var(--ng);display:block}
.quiz-fb.wrong{background:var(--nr-dim);border:1px solid #ff336630;color:var(--nr);display:block}

/* רשימת משימות */
.task-list{background:var(--elevated);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-top:10px}
.task-list-label{font-family:var(--ui);font-size:10px;text-transform:uppercase;color:var(--ny);margin-bottom:9px;font-weight:700;text-align:right}
.tasks{display:flex;flex-direction:column;gap:5px}

.task-item {
  display:flex;align-items:center;gap:9px;cursor:pointer;padding:5px 0;
  transition:color var(--ease);font-size:13px;color:var(--t2);user-select:none;
  flex-direction:row-reverse;text-align:right;
}
.task-item:hover{color:var(--t1)}
.task-cb {
  width:16px;height:16px;border:1px solid var(--border);border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:transparent;transition:all var(--ease);flex-shrink:0;
}
.task-item.done .task-cb{background:var(--ng-dim);border-color:var(--ng);color:var(--ng)}
.task-item.done{color:var(--t3);text-decoration:line-through}

/* כפתור סיום */
.complete-btn {
  margin-top:28px;width:100%;padding:13px;
  font-family:var(--ui);font-size:13px;font-weight:700;letter-spacing:1px;
  background:transparent;border:1px solid var(--ng);color:var(--ng);border-radius:3px;
  cursor:pointer;transition:all var(--ease);display:flex;align-items:center;justify-content:center;gap:9px;
}
.complete-btn:hover{background:var(--ng-dim);box-shadow:var(--ng-glow);transform:translateY(-1px)}
.complete-btn.done{background:var(--ng-dim);box-shadow:var(--ng-glow);pointer-events:none}

/* ניווט */
.nav-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:24px;flex-wrap:wrap;gap:8px;flex-direction:row-reverse}
.nav-btn{font-family:var(--ui);font-size:11px;font-weight:600;padding:5px 13px;background:transparent;border:1px solid var(--border);color:var(--t3);border-radius:2px;cursor:pointer;transition:all var(--ease)}
.nav-btn:hover:not(:disabled){color:var(--ng);border-color:var(--ng)}
.nav-btn:disabled{opacity:0.2;cursor:not-allowed}
.nav-btn.nxt{color:var(--ng);border-color:var(--ng)}
.nav-btn.nxt:hover{background:var(--ng-dim);box-shadow:0 0 12px #00ff8835}

/* מסך פתיחה */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;gap:26px;animation:fadein 0.5s ease}

.w-ascii{font-family:var(--mono);font-size:10px;color:var(--ng);opacity:0.4;line-height:1.4;white-space:pre;text-shadow:0 0 10px var(--ng);direction:ltr}

.w-title{font-family:var(--ui);font-size:clamp(26px,4vw,48px);font-weight:900;color:var(--t1);line-height:1.1}
.w-title em{color:var(--ng);font-style:normal;text-shadow:0 0 20px var(--ng)}
.w-sub{font-family:var(--ui);font-size:13px;color:var(--t3);max-width:440px;font-weight:500;line-height:1.7}

.w-stats{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.w-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 22px;text-align:center;transition:all var(--ease)}
.w-stat:hover{border-color:var(--border-bright);box-shadow:0 0 20px #00ff8808}
.w-stat-n{font-family:var(--display);font-size:24px;font-weight:700;color:var(--ng)}
.w-stat-l{font-family:var(--ui);font-size:10px;color:var(--t3);margin-top:3px;font-weight:600}

.w-btn{font-family:var(--ui);font-size:14px;font-weight:700;color:var(--void);background:var(--ng);border:none;padding:13px 36px;border-radius:3px;cursor:pointer;transition:all var(--ease);box-shadow:0 0 30px #00ff8840}
.w-btn:hover{background:#00ffaa;box-shadow:0 0 50px #00ff8870;transform:translateY(-2px)}

const STATE = {
  completed: JSON.parse(localStorage.getItem('cyberLMS_heb_completed') || '[]'),
  current: null,
  quizAnswers: {}
};

function saveState() {
  localStorage.setItem('cyberLMS_heb_completed', JSON.stringify(STATE.completed));
}

function getTotalLessons() {
  return CURRICULUM.reduce((a,l) => a + l.lessons.length, 0);
}

function getCompletedCount() { return STATE.completed.length; }
function isCompleted(id) { return STATE.completed.includes(id); }

function markComplete(id) {
  if (!STATE.completed.includes(id)) {
    STATE.completed.push(id);
    saveState();
  }
}

function buildSidebar() {
  const sb = document.getElementById('sb');
  sb.innerHTML = '';

  const hdr = document.createElement('div');
  hdr.className = 'sb-header';
  hdr.innerHTML = `<div class="sb-title">// מסלול הלמידה</div>`;
  sb.appendChild(hdr);

  CURRICULUM.forEach(level => {
    const lessons = level.lessons;
    const done = lessons.filter(l => isCompleted(l.id)).length;
    const pct = lessons.length ? Math.round(done / lessons.length * 100) : 0;

    const group = document.createElement('div');
    group.className = `level-group ${level.cls}`;
    group.dataset.levelId = level.id;

    const isOpen = lessons.some(l => l.id === STATE.current?.id);
    if (isOpen) group.classList.add('open');

    group.innerHTML = `
      <button class="level-btn">
        <div class="lvl-badge">${level.num}</div>
        <div class="lvl-info">
          <div class="lvl-name">${level.title}</div>
          <div class="lvl-sub">${done}/${lessons.length} הושלמו</div>
        </div>
        <span class="lvl-arrow">◀</span>
      </button>
      <div class="lvl-pbar"><div class="lvl-pbar-fill" style="width:${pct}%"></div></div>
      <div class="lesson-list">
        ${lessons.map(l => `
          <button class="lesson-btn ${isCompleted(l.id) ? 'done' : ''} ${STATE.current?.id === l.id ? 'active' : ''}"
                  data-lesson-id="${l.id}" data-level-id="${level.id}">
            <div class="lesson-dot">${isCompleted(l.id) ? '✓' : ''}</div>
            <span class="lesson-name">${l.title}</span>
          </button>
        `).join('')}
      </div>
    `;

    group.querySelector('.level-btn').addEventListener('click', () => {
      group.classList.toggle('open');
    });

    group.querySelectorAll('.lesson-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const lessonId = btn.dataset.lessonId;
        const levelId = btn.dataset.levelId;
        const lvl = CURRICULUM.find(l => l.id === levelId);
        const lesson = lvl?.lessons.find(l => l.id === lessonId);
        if (lesson) showLesson(lesson, lvl);
      });
    });

    sb.appendChild(group);
  });
}

function startLearning() {

    for (const lesson of level.lessons) {
      if (!isCompleted(lesson.id)) {
        showLesson(lesson, level);
        return;
      }
    }
  }
  showLesson(CURRICULUM[0].lessons[0], CURRICULUM[0]);
}

// ============================================================
// רינדור שיעור
// ============================================================
function showLesson(lesson, level) {
  STATE.current = lesson;
  buildSidebar();
  updateProgress();

  const allLessons = [];
  CURRICULUM.forEach(lv => lv.lessons.forEach(l => allLessons.push({ lesson: l, level: lv })));
  const idx = allLessons.findIndex(x => x.lesson.id === lesson.id);
  const prev = idx > 0 ? allLessons[idx - 1] : null;
  const next = idx < allLessons.length - 1 ? allLessons[idx + 1] : null;

  const colorMap = { ng: '#00ff88', nc: '#00d4ff', np: '#a855f7', nr: '#ff3366', ny: '#fbbf24' };
  const color = colorMap[level.color] || '#00ff88';
  const done = isCompleted(lesson.id);

  let html = `<div class="lesson-page">`;

  // ניווט עם פירורי לחם
  html += `<div class="lesson-crumb">
    <span class="crumb-cur">${lesson.title}</span>
    <span class="crumb-sep">/</span>
    <span>${level.title}</span>
    <span class="crumb-sep">/</span>
    <span onclick="showWelcome()" style="cursor:pointer;color:var(--t3)">דף הבית</span>
  </div>`;

  // שורת ניווט
  html += `<div class="nav-row">
    <button class="nav-btn nxt" onclick="${next ? `showLesson(CURRICULUM.find(l=>l.id==='${next.level.id}').lessons.find(l=>l.id==='${next.lesson.id}'),CURRICULUM.find(l=>l.id==='${next.level.id}'))` : ''}" ${!next ? 'disabled' : ''}>הבא ▶</button>
    <span style="font-family:var(--ui);font-size:11px;color:var(--t3);font-weight:600">${idx + 1} / ${allLessons.length}</span>
    <button class="nav-btn" onclick="${prev ? `showLesson(CURRICULUM.find(l=>l.id==='${prev.level.id}').lessons.find(l=>l.id==='${prev.lesson.id}'),CURRICULUM.find(l=>l.id==='${prev.level.id}'))` : ''}" ${!prev ? 'disabled' : ''}>◀ קודם</button>
  </div>`;

  // כותרת שיעור
  html += `<div class="lesson-hdr">
    <div class="lesson-lvl-tag" style="color:${color}">
      <span class="tag-dot" style="background:${color};box-shadow:0 0 6px ${color}"></span>
      ${lesson.lvlLabel}
    </div>
    <div class="lesson-title">${lesson.title}</div>
    <div class="lesson-desc">${lesson.desc}</div>
    <div class="lesson-meta">
      <span class="meta-pill">⏱ ${lesson.duration}</span>
      <span class="meta-pill">⚡ ${lesson.difficulty}</span>
      ${done ? `<span class="meta-pill" style="border-color:var(--ng);color:var(--ng)">✓ הושלם</span>` : ''}
    </div>
  </div>`;

  // תיאוריה
  if (lesson.theory) {
    html += buildSection('theory', '📖', 'תיאוריה — איך זה עובד', lesson.theory.body);
  }

  // התקנה
  if (lesson.install) {
    let installBody = lesson.install.body || '';
    if (lesson.install.commands) {
      lesson.install.commands.forEach(cmd => { installBody += buildCodeBlock(cmd.label, cmd.code); });
    }
    if (lesson.install.after) installBody += lesson.install.after;
    html += buildSection('install', '📦', 'התקנה', installBody);
  }

  // תרגול מעשי
  if (lesson.handson) {
    let hoBody = lesson.handson.body || '';
    if (lesson.handson.commands) {
      lesson.handson.commands.forEach(cmd => { hoBody += buildCodeBlock(cmd.label, cmd.code); });
    }
    if (lesson.handson.after) hoBody += lesson.handson.after;
    html += buildSection('handson', '💻', 'תרגול מעשי', hoBody);
  }

  // מחסום ידע
  if (lesson.checkpoint) {
    const qid = `quiz_${lesson.id}`;
    html += `
    <div class="checkpoint-wrap s-card">
      <div class="s-hdr">
        <div class="s-icon" style="background:var(--ny-dim);border:1px solid #fbbf2425">🎯</div>
        <div class="s-title">מחסום ידע — בחן את עצמך</div>
      </div>
      <div class="s-body">
        <div class="quiz-q">${lesson.checkpoint.question}</div>
        <div class="quiz-opts" id="${qid}_opts">
          ${lesson.checkpoint.opts.map((o, i) => `
            <div class="qopt" data-idx="${i}" onclick="selectOpt('${qid}', ${i})">
              <div class="qletter">${String.fromCharCode(65+i)}</div>
              <span>${o}</span>
            </div>
          `).join('')}
        </div>
        <button class="quiz-submit" id="${qid}_btn" onclick="submitQuiz('${qid}', ${lesson.checkpoint.answer}, '${encodeURIComponent(lesson.checkpoint.explanation)}')" disabled>שלח תשובה</button>
        <div class="quiz-fb" id="${qid}_fb"></div>
      </div>
    </div>`;
  }

  // רשימת משימות
  if (lesson.tasks) {
    const taskKey = `tasks_${lesson.id}`;
    const savedTasks = JSON.parse(localStorage.getItem(taskKey) || '[]');
    html += `
    <div class="s-card handson">
      <div class="s-hdr">
        <div class="s-icon">☑️</div>
        <div class="s-title">רשימת משימות</div>
      </div>
      <div class="s-body">
        <p>ודא שהשלמת כל משימה מעשית לפני סימון השיעור כהושלם:</p>
        <div class="task-list">
          <div class="task-list-label">// משימות לאימות</div>
          <div class="tasks" id="tasks_${lesson.id}">
            ${lesson.tasks.map((t, i) => `
              <div class="task-item ${savedTasks.includes(i) ? 'done' : ''}" onclick="toggleTask('${lesson.id}', ${i})" data-task-idx="${i}">
                <div class="task-cb">${savedTasks.includes(i) ? '✓' : ''}</div>
                <span>${t}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>`;
  }

  // כפתור סיום
  html += `
    <button class="complete-btn ${done ? 'done' : ''}" id="completeBtn_${lesson.id}" onclick="completeLesson('${lesson.id}', '${level.id}')">
      ${done ? '✓ שיעור הושלם' : '◉ סמן כהושלם'}
    </button>`;

  html += `</div>`;

  const mainEl = document.getElementById('content');
  mainEl.innerHTML = html;
  mainEl.scrollTop = 0;
  document.getElementById('main').scrollTop = 0;
}

// ============================================================
// בניית כרטיס סקשן
// ============================================================
function buildSection(cls, icon, title, bodyHtml) {
  return `
  <div class="s-card ${cls}">
    <div class="s-hdr">
      <div class="s-icon">${icon}</div>
      <div class="s-title">${title}</div>
    </div>
    <div class="s-body">${bodyHtml}</div>
  </div>`;
}

let copyCounter = 0;
function buildCodeBlock(label, code) {
  const id = 'cb_' + (++copyCounter);
  const plainCode = code.replace(/<[^>]+>/g, '');
  return `
  <div class="cmd-block">
    <div class="cmd-hdr">
      <span class="cmd-label">${label}</span>
      <button class="copy-btn" id="${id}" onclick="copyCode('${id}', \`${plainCode.replace(/`/g,'\\`').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}\`)">העתק</button>
    </div>
    <div class="cmd-body"><code>${code}</code></div>
  </div>`;
}

// ============================================================
// פונקציות אינטראקציה
// ============================================================
function copyCode(btnId, code) {
  const cleanCode = code.trim();
  navigator.clipboard.writeText(cleanCode).then(() => {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.textContent = 'הועתק!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'העתק'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = cleanCode;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById(btnId);
    if (btn) { btn.textContent = 'הועתק!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'העתק'; btn.classList.remove('copied'); }, 2000); }
  });
}

function selectOpt(qid, idx) {
  const opts = document.querySelectorAll(`#${qid}_opts .qopt`);
  opts.forEach(o => o.classList.remove('sel'));
  opts[idx].classList.add('sel');
  STATE.quizAnswers[qid] = idx;
  const btn = document.getElementById(`${qid}_btn`);
  if (btn) btn.disabled = false;
}

function submitQuiz(qid, correctIdx, explanationEncoded) {
  const explanation = decodeURIComponent(explanationEncoded);
  const selected = STATE.quizAnswers[qid];
  if (selected === undefined) return;

  const opts = document.querySelectorAll(`#${qid}_opts .qopt`);
  const fb = document.getElementById(`${qid}_fb`);
  const btn = document.getElementById(`${qid}_btn`);

  opts.forEach(o => o.style.pointerEvents = 'none');
  if (btn) btn.disabled = true;

  if (selected === correctIdx) {
    opts[selected].classList.add('right');
    fb.className = 'quiz-fb right';
    fb.innerHTML = `✓ ${explanation}`;
  } else {
    opts[selected].classList.add('wrong');
    opts[correctIdx].classList.add('right');
    fb.className = 'quiz-fb wrong';
    fb.innerHTML = `✗ לא נכון. ${explanation}`;
  }
}

function toggleTask(lessonId, taskIdx) {
  const taskKey = `tasks_${lessonId}`;
  let saved = JSON.parse(localStorage.getItem(taskKey) || '[]');
  if (saved.includes(taskIdx)) {
    saved = saved.filter(i => i !== taskIdx);
  } else {
    saved.push(taskIdx);
  }
  localStorage.setItem(taskKey, JSON.stringify(saved));

  const tasks = document.querySelectorAll(`#tasks_${lessonId} .task-item`);
  tasks.forEach(t => {
    const idx = parseInt(t.dataset.taskIdx);
    if (saved.includes(idx)) {
      t.classList.add('done');
      t.querySelector('.task-cb').textContent = '✓';
    } else {
      t.classList.remove('done');
      t.querySelector('.task-cb').textContent = '';
    }
  });
}

function completeLesson(lessonId, levelId) {
  markComplete(lessonId);
  updateProgress();
  buildSidebar();

  const btn = document.getElementById(`completeBtn_${lessonId}`);
  if (btn) {
    btn.classList.add('done');
    btn.textContent = '✓ שיעור הושלם';
  }

  const metaArea = document.querySelector('.lesson-meta');
  if (metaArea && !metaArea.querySelector('.done-pill')) {
    const pill = document.createElement('span');
    pill.className = 'meta-pill done-pill';
    pill.style.cssText = 'border-color:var(--ng);color:var(--ng)';
    pill.textContent = '✓ הושלם';
    metaArea.appendChild(pill);
  }
}

    if (firstGroup) firstGroup.classList.add('open');

});
